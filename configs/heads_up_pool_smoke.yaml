# Smoke test for the new per-episode opponent rotation ("training pool")
# pipeline. 100k timesteps, 1 generation, eval_gate disabled (the learner
# faces a random opponent every hand so a head-to-head gate against any
# single parent isn't meaningful). Confirms rotation runs end-to-end
# before launching the long chain.

environment:
  num_players: 2
  starting_stack: 1000
  small_blind: 5
  big_blind: 10
  min_raise_multiplier: 2.0
  rake_enabled: false
  rake_percent: 0.0
  rake_cap: 0
  reset_stacks_every_n_timesteps: 3000

training:
  total_timesteps: 100000
  learning_rate: 0.0003
  n_steps: 2048
  batch_size: 128
  n_epochs: 5
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.05
  vf_coef: 0.5
  max_grad_norm: 0.5

opponents:
  rotate_per_episode: true
  strategy: weighted_recency
  kind: ppo
  fixed_ids: []

continuation:
  resume_from: heads_up_chain_v6_gen3
  generations: 1

eval_gate:
  enabled: false

regression_eval:
  enabled: false

ppo:
  policy: "MlpPolicy"
  verbose: 1
  tensorboard_log: "./logs/"

logging:
  log_dir: "./logs/"
  save_frequency: 50000
  model_dir: "./models/"

# Smoke config — short run to verify observability pipeline populates
# every artifact (metrics.json, action_history.json, street_breakdown.json,
# value_calibration.json, opponent_profits.json, registry.json) end-to-end.
# Total timesteps kept low so this finishes in a few minutes on CPU.

environment:
  num_players: 3
  starting_stack: 1000
  small_blind: 5
  big_blind: 10
  min_raise_multiplier: 2.0
  rake_enabled: false
  rake_percent: 0.0
  rake_cap: 0
  reset_stacks_every_n_timesteps: 3000

training:
  total_timesteps: 50000
  learning_rate: 0.001
  n_steps: 2048
  batch_size: 128
  n_epochs: 5
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.05
  vf_coef: 0.5
  max_grad_norm: 0.5

opponents:
  strategy: latest
  kind: null
  fixed_ids: []

continuation:
  resume_from: null
  generations: 1

eval_gate:
  enabled: false
  num_hands: 1000
  threshold_mbb_per_100: 0.0
  seed: 0

ppo:
  policy: "MlpPolicy"
  verbose: 1
  tensorboard_log: "./logs/"

logging:
  log_dir: "./logs/"
  save_frequency: 50000
  model_dir: "./models/"

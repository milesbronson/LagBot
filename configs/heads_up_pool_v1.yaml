# First real run of the "training pool" curriculum. Per-episode opponent
# rotation samples a fresh opponent every hand via weighted_recency, so
# the learner sees the whole league (v1 fixtures through v6_gen3) instead
# of one parent. Goal: build the opponent-conditional play the chained
# self-play runs couldn't reach because every gen overfit its predecessor.
#
# 6 generations × 2M timesteps each. EvalGate against the immediate
# parent stays on as a "did we regress against this style" signal; the
# regression sweep is the real catastrophic-forgetting check.

environment:
  num_players: 2
  starting_stack: 1000
  small_blind: 5
  big_blind: 10
  min_raise_multiplier: 2.0
  rake_enabled: false
  rake_percent: 0.0
  rake_cap: 0
  reset_stacks_every_n_timesteps: 3000

training:
  total_timesteps: 2000000
  learning_rate: 0.0003
  n_steps: 2048
  batch_size: 128
  n_epochs: 5
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.05
  vf_coef: 0.5
  max_grad_norm: 0.5

opponents:
  rotate_per_episode: true
  strategy: weighted_recency
  kind: ppo
  fixed_ids: []

continuation:
  resume_from: heads_up_chain_v6_gen3
  generations: 6

eval_gate:
  enabled: true
  num_hands: 1000
  threshold_mbb_per_100: -100.0
  seed: 0

regression_eval:
  enabled: true
  num_hands: 500
  threshold_mbb_per_100: -100.0
  seed: 0
  include_fixtures: true

ppo:
  policy: "MlpPolicy"
  verbose: 1
  tensorboard_log: "./logs/"

logging:
  log_dir: "./logs/"
  save_frequency: 100000
  model_dir: "./models/"

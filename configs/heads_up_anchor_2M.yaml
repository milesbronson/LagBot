# Heads-up anchor: build a strong base policy before any self-play.
# 1 generation × 2M timesteps vs RandomAgent. RandomAgent is a strictly
# harder baseline than CallAgent — beating it reliably means the policy
# has learned to (a) value-bet strong holdings, (b) fold weak holdings
# under pressure, (c) not bluff into a calling station. Strong anchor
# → meaningful first self-play gradient.
#
# No EvalGate: there's no parent to compare against. The resulting card
# is the foundation that the subsequent chain config resumes from.

environment:
  num_players: 2
  starting_stack: 1000
  small_blind: 5
  big_blind: 10
  min_raise_multiplier: 2.0
  rake_enabled: false
  rake_percent: 0.0
  rake_cap: 0
  reset_stacks_every_n_timesteps: 3000

training:
  total_timesteps: 2000000
  learning_rate: 0.0003
  n_steps: 2048
  batch_size: 128
  n_epochs: 5
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.05
  vf_coef: 0.5
  max_grad_norm: 0.5

opponents:
  strategy: fixed
  kind: null
  fixed_ids: [rule_random_v0]

continuation:
  resume_from: null
  generations: 1

eval_gate:
  enabled: false
  num_hands: 1000
  threshold_mbb_per_100: 0.0
  seed: 0

ppo:
  policy: "MlpPolicy"
  verbose: 1
  tensorboard_log: "./logs/"

logging:
  log_dir: "./logs/"
  save_frequency: 100000
  model_dir: "./models/"
